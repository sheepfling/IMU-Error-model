  # AG71 inertial channel: 1 mg bias, used as a conservative 1-sigma proxy.
  turn_on_bias_std: 0.00980665
  long_term_bias_std: 0.00980665
  bias_correlation_time: 250.0
  apply_clipping: false
  misalignment_std: 0.0
  scale: 1048576.0
  temperature_model:
    enabled: true
    reference_temp_C: 25.0
    bias_linear_per_C: [ 0.0, 0.0, 0.0 ]
    scale_linear_per_C: [ 0.0, 0.0, 0.0 ]

