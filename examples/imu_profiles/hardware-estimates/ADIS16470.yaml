# Reference links:
# - ADIS16470 public manufacturer reference
# NOTIONAL EXAMPLE ONLY: all values below are approximate modeling estimates,
# not official manufacturer settings, specifications, certification data, or
# performance guarantees. References provide provenance, not authority.
schema_version: 1
model_name: ADIS16470
sample_period_s: 0.0005

metadata:
  family: adis16470
  vendor: "Analog Devices"
  grade: industrial
  revision: RevC
  source_date: "2026-02-23"
  tags: [candidate, gyro_technology_mems_vibratory, accel_technology_mems]
  active: true

accelerometer:
  # ±40 g
  measurement_range: 392.26599999999996   # m/s^2
  # Error over temperature ±0.1% -> 1000 ppm
  linear_scale_factor: 1000e-6
  # Nonlinearity up to 1.5% FS at ±40 g -> 15000 ppm
  nonlinear_scale_factor: 15000e-6
  # Allan-curve anchor: VRW 0.037 m/s/sqrt(Hr) -> 0.000616667 m/s^2/sqrt(Hz).
  # The datasheet also lists 100 ug/sqrt(Hz); this profile selects the VRW
  # conversion because it reproduces the published Allan curve.
  noise_spectral_density: 6.166666666666666e-4 # m/s^2/sqrt(Hz)
  # Use ±4 mg (1 sigma over temp) as a conservative "turn-on / environment" bias term
  turn_on_bias_std: 3.92266e-2            # m/s^2
  # Bias in-run stability: 13 ug (1 sigma)
  long_term_bias_std: 1.2748645e-4        # m/s^2
  # Grounded choice: ~32 s default averaging time in on-device bias estimator
  bias_correlation_time: 32.0
  # Chart-informed finite-band bias-instability floor; not a separately
  # published parameter. Approx. 8 ug floor in Figure 11.
  flicker_bias_std: 7.84532e-5             # m/s^2 (8 ug Allan target)
  flicker_min_correlation_time: 1.0        # s, chart-informed band
  flicker_max_correlation_time: 1000.0     # s, chart-informed band
  flicker_components: 16
  apply_clipping: false
  misalignment_std: 0.0
  scale: 1048576.0
  temperature_model:
    enabled: true
    reference_temp_C: 25.0
    bias_linear_per_C: [ 0.0, 0.0, 0.0 ]
    scale_linear_per_C: [ 0.0, 0.0, 0.0 ]

gyro:
  # ±2000 deg/s
  measurement_range: 34.906585039886586   # rad/s
  # Error over temperature ±0.25% -> 2500 ppm
  linear_scale_factor: 2500e-6
  # Nonlinearity ±0.25% FS -> 2500 ppm
  nonlinear_scale_factor: 2500e-6
  # Allan-curve anchor: ARW 0.34 deg/sqrt(Hr) -> 9.8902e-5 rad/s/sqrt(Hz).
  # The datasheet also lists 0.008 deg/s/sqrt(Hz); this profile selects the
  # ARW conversion because it reproduces the published Allan curve.
  noise_spectral_density: 9.890199094634536e-5  # rad/s/sqrt(Hz)
  # Use 0.2 deg/s (1 sigma over temp) as a conservative "turn-on / environment" bias term
  turn_on_bias_std: 3.490658503988659e-3  # rad/s
  # Bias in-run stability: 8 deg/hr (1 sigma)
  long_term_bias_std: 3.878509448876288e-5 # rad/s
  bias_correlation_time: 32.0
  # Chart-informed finite-band bias-instability floor; not a separately
  # published parameter. Approx. 8 deg/hr floor in Figure 8.
  flicker_bias_std: 3.878509448876288e-5   # rad/s (8 deg/hr Allan target)
  flicker_min_correlation_time: 1.0        # s, chart-informed band
  flicker_max_correlation_time: 1000.0     # s, chart-informed band
  flicker_components: 16
  apply_clipping: false
  misalignment_std: 0.0
  scale: 1048576.0
  temperature_model:
    enabled: true
    reference_temp_C: 25.0
    bias_linear_per_C: [ 0.0, 0.0, 0.0 ]
    scale_linear_per_C: [ 0.0, 0.0, 0.0 ]
