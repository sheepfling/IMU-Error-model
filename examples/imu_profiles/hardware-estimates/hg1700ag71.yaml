  measurement_range: 686.4655
  linear_scale_factor: 300e-6
  nonlinear_scale_factor: 500e-6
  # AG71 inertial channel: VRW 0.065 ft/s/sqrt(hr) -> SI density.
  noise_spectral_density: 3.302e-4
