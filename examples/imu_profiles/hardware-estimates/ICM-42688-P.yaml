  measurement_range: 156.9064            # m/s^2
  # Sensitivity initial tolerance ±0.5% -> 5000 ppm
  linear_scale_factor: 5000e-6
  # Nonlinearity ±0.1% (datasheet table) -> 1000 ppm
  nonlinear_scale_factor: 1000e-6
  # PSD @ 10 Hz: up to 70 ug/sqrt(Hz) (use worst axis)
  noise_spectral_density: 6.864655e-4    # m/s^2/sqrt(Hz)
  # Initial zero-g tolerance ±20 mg
  turn_on_bias_std: 1.96133e-1           # m/s^2
  # Datasheet does not give "bias instability"; pick a conservative in-run placeholder (1 mg)
  long_term_bias_std: 9.80665e-3         # m/s^2
  bias_correlation_time: 300.0           # modeling assumption (Allan-min typical order)
  apply_clipping: false
  misalignment_std: 0.0
  scale: 1048576.0
  temperature_model:
    enabled: true
    reference_temp_C: 25.0
    bias_linear_per_C: [ 0.0, 0.0, 0.0 ]
    scale_linear_per_C: [ 0.0, 0.0, 0.0 ]

